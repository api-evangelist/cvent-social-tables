apis:
  - aid: cvent-social-tables:events-api
    name: Social Tables Events API (Legacy)
    description: >-
      The legacy Social Tables Events API provided REST access to
      events, venues, floor plans, diagrams, and seating arrangements
      created in Social Tables. With Social Tables now part of Cvent's
      Hospitality Cloud, programmatic access has largely consolidated
      into the Cvent Platform REST API, though the developer portal at
      developer.socialtables.com remains as historical reference.
