aid: cvent-social-tables
name: Cvent Social Tables
kind: company
description: >-
  Social Tables, a Cvent product, is event diagramming, room-design, and
  seating software for hospitality venues, hotels, and meeting planners.
  Planners design 2D / 3D floor plans, manage seating arrangements,
  build attendee guest lists, and collaborate with venues. Social Tables
  has been integrated into the Cvent Hospitality Cloud and Diagramming
  product line. The legacy Social Tables developer portal exposed a
  REST API for events, floor plans, and diagrams; new programmatic
  integration is generally delivered through the Cvent Platform REST
  API and the Cvent Diagramming product.
